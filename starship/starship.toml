# format = '[р“ғ   $user](fg:$style) '
# format = '[вңҢпёҺпёҺ  $user](fg:$style) '
# format = '[рқ…Ў $user](fg:$style) '
# format = '[вҳҒпёҺ  $user](fg:$style) '
