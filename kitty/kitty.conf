# BEGIN_KITTY_THEME
include ./themes/mellow.conf
# END_KITTY_THEME

# BEGIN_KITTY_FONTS
font_family      family="JetBrainsMono Nerd Font"
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        13.0
# END_KITTY_FONTS

background_image /home/raianeeo/Pictures/Wallpapers/arvore.jpg
background_image_layout cscaled
background_tint 0.98

# Smear cursor
cursor_trail 3

# O primeiro valor (0.1) é o tempo em segundos que o rastro leva para começar a sumir
# O segundo valor (0.4) controla a velocidade da animação de desaparecimento
cursor_trail_decay 0.1 0.4

# Faz com que o rastro apareça mesmo em movimentos curtos (em pixels)
cursor_trail_start_threshold 0

# Define o tamanho inicial em células (colunas x linhas)
remember_window_size  no
initial_window_width  140c
initial_window_height 35c

confirm_os_window_close 0

map super+q quit
